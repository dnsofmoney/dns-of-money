      xApp bootstrap — we speak the raw postMessage protocol documented in
      XRPL Labs' open-source xAppBuilder (see src/xaman/sdk.ts). No external
      SDK is injected into the WebView; commands are JSON-encoded window
      messages and the OTT arrives via URL query params (?xAppToken=…).
      This avoids the brittle `window.xumm` / `window.Xumm` global races
      that the hosted SDK scripts introduce across Xaman versions.
    -->
